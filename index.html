<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Ghost Reflex Shooter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- RED FLASH WHEN MISSED OR DAMAGE TAKEN -->
    <div id="damage-flash"></div>

    <!-- MAIN MENU -->
    <div id="menu-screen">
        <h1>GHOST HUNTER 2D</h1>
        <p>[ REFLEX TAP ENGINE v1.0 ]</p>
        <button class="btn" onclick="startGame()">Start Hunt</button>
    </div>

    <!-- HUD LAYOUT -->
    <div id="game-hud">
        <div id="scoreTxt">ELIMINATIONS: 0</div>
        <div id="hpTxt">HEALTH: 100%</div>
    </div>

    <!-- GAME OVER -->
    <div id="game-over">
        <h1 class="wasted-text">HAUNTED & DEFEATED</h1>
        <button class="btn" onclick="restartGame()">Try Again</button>
    </div>

    <!-- 2D GRAPHICS RENDERER -->
    <canvas id="gameCanvas"></canvas>

    <script src="game.js"></script>
</body>
</html>
